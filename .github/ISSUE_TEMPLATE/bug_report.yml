name: Bug report
description: General app bug (UI, crash, cleaner, IPC)
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: OZBoost version
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Home / Boost
        - Cleaner
        - Tools / Bloatware
        - Settings
        - Installer / portable
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log excerpt (optional)
      description: Path is shown in Settings → Log file. Redact personal paths if needed.
